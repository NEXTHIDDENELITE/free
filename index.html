<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAMER FCK - NAZIM COMING SOON</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle, #1c0303 0%, #000000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* Scanline Grid effect */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 255, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 1;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        /* Warning text at top */
        .warning-text {
            color: #ff2a2a;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 42, 42, 0.6);
            animation: pulse 1.5s infinite alternate;
        }

        /* Main Title: SCAMER FCK */
        .main-title {
            font-size: 4.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            margin-bottom: 0px;
            line-height: 1;
        }

        .main-title span {
            color: #ff0055;
            text-shadow: 0 0 30px #ff0055;
        }

        /* Your Name: NAZIM with Cyan Glow */
        .sub-name {
            font-size: 3.5rem;
            font-weight: 800;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin-bottom: 35px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8), 0 0 40px rgba(0, 255, 255, 0.4);
            animation: glitchText 3s infinite;
        }

        /* Coming Soon Box */
        .coming-soon-box {
            display: inline-block;
            border: 2px solid #ff3333;
            padding: 12px 45px;
            background: rgba(255, 0, 0, 0.07);
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.25), inset 0 0 15px rgba(255, 51, 51, 0.15);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .coming-soon-text {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #fff;
            animation: blink 1.2s infinite;
        }

        /* Bottom loading line indicator */
        .coming-soon-box::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: #ff0055;
            width: 100%;
            box-shadow: 0 0 12px #ff0055;
            animation: load 2.5s infinite linear;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.02); opacity: 1; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes load {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Subtle text glitch effect for NAZIM */
        @keyframes glitchText {
            0%, 95%, 100% { text-shadow: 0 0 20px rgba(0, 255, 255, 0.8); }
            96% { text-shadow: -3px -2px 0 #ff0055, 3px 2px 0 #00ffff; }
            97% { text-shadow: 3px 2px 0 #ff0055, -3px -2px 0 #00ffff; }
            98% { text-shadow: -2px 3px 0 #ff0055, 2px -3px 0 #00ffff; }
            99% { text-shadow: 0 0 20px rgba(0, 255, 255, 0.8); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main-title { font-size: 2.8rem; }
            .sub-name { font-size: 2.2rem; letter-spacing: 6px; margin-bottom: 25px; }
            .coming-soon-text { font-size: 1.1rem; letter-spacing: 4px; }
            .warning-text { font-size: 0.85rem; letter-spacing: 4px; }
            .coming-soon-box { padding: 10px 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="warning-text">⚠️ SYSTEM OVERRIDE ⚠️</div>
        <h1 class="main-title">SCAMER <span>FCK</span></h1>
        <div class="sub-name">SCAMER NAME ? </div> 
        
        <div class="coming-soon-box">
            <div class="coming-soon-text">COMING SOON</div>
        </div>
    </div>

</body>
</html>
